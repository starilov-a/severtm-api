services:
  php-fpm:
    container_name: php-fpm
    build:
      context: ./..
      dockerfile: ./docker/php-fpm/Dockerfile
      args:
        PUID: ${PUID}
        PGID: ${PGID}
        INSTALL_XDEBUG: ${INSTALL_XDEBUG}
    volumes:
      - ./../:/var/www/
      - ./php-fpm/conf.d/99-app.ini:/usr/local/etc/php/conf.d/99-app.ini:ro
      - ./php-fpm/pool.d/docker.conf:/usr/local/etc/php-fpm.d/docker.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: "serverName=docker-symfony"
  nginx:
    container_name: nginx-api
    build:
      context: ./nginx
      args:
        PUID: ${PUID}
        PGID: ${PGID}
    ports:
      - ${NGINX_HOST_HTTP_PORT}:80
    volumes:
      - ..:/var/www:rw
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    
